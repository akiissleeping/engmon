<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EngMon 🐲</title>
<style>
:root{
  --bg:#0d0d1f;--bg2:#13132a;--card:#1a1a35;--border:#2a2a50;
  --accent:#7c6fff;--gold:#ffd700;--green:#00e676;--red:#ff4757;
  --blue:#4facfe;--text:#e8e8f8;--muted:#7878a8;--r:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);
  max-width:480px;margin:0 auto;min-height:100vh;position:relative;overflow-x:hidden}

/* ── SCREENS ─────────────────────────────────── */
.screen{display:none;flex-direction:column;min-height:100vh;padding-bottom:72px}
.screen.active{display:flex}

/* ── TOP BAR ─────────────────────────────────── */
.topbar{display:flex;justify-content:space-between;align-items:center;
  padding:14px 18px;background:var(--bg2);border-bottom:1px solid var(--border)}
.topbar-logo{font-size:1.1rem;font-weight:800;color:var(--gold)}
.topbar-stats{display:flex;gap:14px;font-size:.8rem;font-weight:700}
.streak{color:#ff8c00}.xp-stat{color:var(--gold)}

/* ── CHARACTER AREA ───────────────────────────── */
.char-area{text-align:center;padding:24px 16px 16px;position:relative}
.char-level{position:absolute;top:18px;left:18px;
  background:var(--gold);color:#000;font-weight:900;font-size:.75rem;
  padding:3px 10px;border-radius:20px}
.char-wrapper{position:relative;display:inline-block;margin:0 auto}
.char-svg{width:140px;height:140px;filter:drop-shadow(0 0 20px rgba(124,111,255,.6))}
.char-particles{position:absolute;inset:0;pointer-events:none}
.particle{position:absolute;width:6px;height:6px;border-radius:50%;
  background:var(--gold);animation:float-particle 3s infinite;opacity:0}
.char-name{font-size:1.1rem;font-weight:800;color:var(--text);margin-top:8px}
.char-title{font-size:.72rem;color:var(--muted);letter-spacing:.5px}
.xp-section{margin:12px 18px}
.xp-labels{display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);margin-bottom:4px}
.xp-bar{height:10px;background:var(--border);border-radius:5px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));
  border-radius:5px;transition:width .6s ease}

/* ── CARDS ────────────────────────────────────── */
.cards{padding:0 14px;display:flex;flex-direction:column;gap:10px}
.game-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;
  transition:all .2s;text-decoration:none;color:inherit}
.game-card:hover{border-color:var(--accent);background:#1e1e40}
.game-card:active{transform:scale(.98)}
.card-icon{font-size:2rem;flex-shrink:0}
.card-body{flex:1}
.card-title{font-weight:800;font-size:.95rem}
.card-sub{font-size:.75rem;color:var(--muted);margin-top:2px}
.card-meta{font-size:.7rem;color:var(--accent);margin-top:4px;font-weight:700}
.card-arrow{color:var(--muted);font-size:1.3rem}
.boss-card{border-color:#ff4757;background:#1f1020}
.boss-card .card-title{color:#ff4757}
.boss-card .card-meta{color:#ff8c00}
.done-card{opacity:.7}
.done-badge{background:var(--green);color:#000;font-size:.6rem;font-weight:700;
  padding:2px 8px;border-radius:20px}

/* ── WEEKLY DOTS ──────────────────────────────── */
.weekly-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 18px;margin:0 14px}
.weekly-title{font-size:.75rem;color:var(--muted);font-weight:700;margin-bottom:10px;
  display:flex;justify-content:space-between}
.day-dots{display:flex;gap:8px;justify-content:center}
.day-dot{flex:1;aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:var(--border);font-size:.55rem;
  color:var(--muted);font-weight:700;transition:all .3s}
.day-dot.done{background:var(--green);color:#000}
.day-dot.today{border:2px solid var(--accent)}

/* ── BOTTOM NAV ───────────────────────────────── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;background:var(--bg2);border-top:1px solid var(--border);
  display:flex;z-index:100}
.nav-btn{flex:1;border:none;background:none;color:var(--muted);
  padding:10px 4px 8px;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:2px;font-size:.58rem;font-weight:700;transition:color .2s}
.nav-btn.active{color:var(--accent)}
.nav-btn .icon{font-size:1.4rem}

/* ── LESSON HEADER ────────────────────────────── */
.lesson-header{background:var(--bg2);padding:12px 16px;display:flex;
  align-items:center;gap:12px;border-bottom:1px solid var(--border);flex-shrink:0}
.back-btn{background:none;border:1px solid var(--border);color:var(--text);
  border-radius:8px;padding:6px 12px;cursor:pointer;font-size:.8rem}
.timer-wrap{flex:1}
.timer-bar-bg{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.timer-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--accent));
  border-radius:4px;transition:width 1s linear}
.timer-text{font-size:.7rem;color:var(--muted);text-align:right;margin-top:2px;font-weight:700}

/* ── LESSON CONTENT ───────────────────────────── */
.lesson-content{flex:1;padding:16px;overflow-y:auto}
.phase-badge{display:inline-block;background:var(--accent);color:#fff;
  font-size:.65rem;padding:2px 10px;border-radius:20px;font-weight:700;
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.situation-card{background:var(--card);border-radius:var(--r);padding:20px;
  text-align:center;border:1px solid var(--border)}
.situation-emoji{font-size:3.5rem;margin-bottom:12px}
.situation-title{font-size:1.2rem;font-weight:800;margin-bottom:6px}
.situation-desc{font-size:.82rem;color:var(--muted);line-height:1.6}
.situation-desc-ja{font-size:.78rem;color:var(--accent);margin-top:6px}
.start-lesson-btn{margin-top:20px;width:100%;padding:14px;background:var(--accent);
  border:none;border-radius:10px;color:#fff;font-weight:800;font-size:1rem;cursor:pointer}

/* ── DIALOGUE ─────────────────────────────────── */
.dialogue-list{display:flex;flex-direction:column;gap:12px}
.d-bubble-row{display:flex;gap:10px;align-items:flex-start}
.d-bubble-row.right{flex-direction:row-reverse}
.d-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:1.2rem;flex-shrink:0;border:2px solid var(--border)}
.d-bubble{max-width:75%;cursor:pointer}
.d-speaker{font-size:.62rem;color:var(--muted);font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:3px}
.d-bubble-row.right .d-speaker{text-align:right}
.d-text{background:var(--card);border-radius:12px 12px 12px 2px;padding:10px 14px;
  border:1px solid var(--border)}
.d-bubble-row.right .d-text{border-radius:12px 12px 2px 12px}
.d-en{font-weight:700;font-size:.88rem;line-height:1.5}
.d-ja{font-size:.72rem;color:var(--muted);margin-top:4px}
.d-bubble.speaking .d-text{border-color:var(--accent);box-shadow:0 0 12px rgba(124,111,255,.4)}
.d-bubble.speaking .d-en{color:var(--gold)}
.play-all-btn{width:100%;margin-top:14px;padding:12px;background:var(--bg2);
  border:1px solid var(--accent);border-radius:10px;color:var(--accent);
  font-weight:700;cursor:pointer;font-size:.88rem}
.play-all-btn.playing{background:var(--accent);color:#fff}
.next-phase-btn{width:100%;margin-top:16px;padding:14px;background:var(--green);
  border:none;border-radius:10px;color:#000;font-weight:800;font-size:.95rem;cursor:pointer}

/* ── VOCAB CARDS ──────────────────────────────── */
.vocab-flip-card{perspective:600px;height:200px;cursor:pointer;margin-bottom:12px}
.vocab-flip-inner{width:100%;height:100%;position:relative;
  transform-style:preserve-3d;transition:transform .5s}
.vocab-flip-card.flipped .vocab-flip-inner{transform:rotateY(180deg)}
.vocab-face{position:absolute;inset:0;border-radius:var(--r);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;backface-visibility:hidden;text-align:center}
.vocab-front{background:linear-gradient(135deg,var(--accent),#4facfe)}
.vocab-back{background:linear-gradient(135deg,#f093fb,#f5576c);transform:rotateY(180deg)}
.vocab-face .vlabel{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;opacity:.7;margin-bottom:8px}
.vocab-face .vterm{font-size:1.6rem;font-weight:900}
.vocab-face .vex{font-size:.78rem;opacity:.85;margin-top:10px;font-style:italic;line-height:1.5}
.vocab-origin{width:100%;margin-top:10px;background:rgba(0,0,0,.3);border-radius:8px;padding:8px 10px;text-align:left}
.origin-tag{font-size:.58rem;color:var(--gold);font-weight:700;letter-spacing:.5px;display:block;margin-bottom:3px}
.origin-orig{font-size:.67rem;color:rgba(255,255,255,.55);margin-bottom:5px;display:block;font-style:italic}
.origin-why{font-size:.72rem;color:rgba(255,255,255,.9);line-height:1.55;display:block}
.vocab-progress{display:flex;gap:6px;justify-content:center;margin-bottom:8px}
.vocab-dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.vocab-dot.active{background:var(--gold)}

/* ── QUIZ ─────────────────────────────────────── */
.quiz-q{background:var(--card);border-radius:var(--r);padding:18px;
  border:1px solid var(--border);margin-bottom:14px}
.quiz-qnum{font-size:.7rem;color:var(--accent);font-weight:700;margin-bottom:6px}
.quiz-qtext{font-size:.95rem;font-weight:700;line-height:1.5}
.quiz-qsub{font-size:.75rem;color:var(--muted);font-style:italic;margin-top:4px}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.quiz-opt{background:var(--card);border:2px solid var(--border);border-radius:10px;
  padding:12px 16px;cursor:pointer;font-size:.85rem;font-weight:600;
  text-align:left;color:var(--text);transition:all .2s}
.quiz-opt:hover:not(:disabled){border-color:var(--accent)}
.quiz-opt.correct{border-color:var(--green);background:#0d2e1a;color:var(--green)}
.quiz-opt.wrong{border-color:var(--red);background:#2e0d0d;color:var(--red)}
.quiz-opt:disabled{cursor:default;opacity:.8}
.quiz-fb{background:var(--bg2);border-radius:10px;padding:12px;font-size:.8rem;
  line-height:1.6;margin-top:10px;border-left:3px solid var(--green)}
.quiz-fb.wrong-fb{border-left-color:var(--red)}

/* ── RESULT SCREEN ────────────────────────────── */
.result-wrap{text-align:center;padding:30px 20px}
.result-emoji{font-size:5rem;margin-bottom:16px;animation:bounce 1s infinite}
.result-title{font-size:1.4rem;font-weight:900;margin-bottom:8px}
.result-xp{font-size:1rem;color:var(--gold);font-weight:700;margin-bottom:16px}
.xp-items{display:flex;flex-direction:column;gap:6px;margin-bottom:20px;text-align:left;
  background:var(--card);border-radius:10px;padding:14px}
.xp-item{display:flex;justify-content:space-between;font-size:.8rem}
.xp-item .plus{color:var(--gold);font-weight:700}
.level-up-banner{background:linear-gradient(135deg,var(--gold),#ff8c00);
  border-radius:10px;padding:14px;margin-bottom:16px;display:none}
.level-up-banner.show{display:block}
.level-up-banner h3{font-size:1.1rem;font-weight:900;color:#000}
.back-home-btn{width:100%;padding:14px;background:var(--accent);border:none;
  border-radius:10px;color:#fff;font-weight:800;font-size:1rem;cursor:pointer}

/* ── BOSS BATTLE ──────────────────────────────── */
.battle-area{padding:16px;display:flex;flex-direction:column;gap:14px}
.battle-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.fighter{flex:1;text-align:center}
.fighter-name{font-size:.72rem;color:var(--muted);font-weight:700;text-transform:uppercase;margin-bottom:6px}
.hp-bar-wrap{background:var(--border);border-radius:4px;height:10px;overflow:hidden;margin-top:4px}
.hp-fill{height:100%;border-radius:4px;transition:width .5s}
.boss-hp{background:linear-gradient(90deg,var(--red),#ff8c00)}
.player-hp{background:linear-gradient(90deg,var(--green),var(--blue))}
.hp-text{font-size:.68rem;color:var(--muted);margin-top:2px;font-weight:700}
.battle-vs{font-size:1.2rem;font-weight:900;color:var(--gold);align-self:center}
.boss-display{font-size:7rem;text-align:center;animation:boss-float 3s ease-in-out infinite}
.player-display{font-size:5rem;animation:char-bounce .8s ease-in-out infinite alternate}
.battle-log{background:var(--card);border-radius:10px;padding:12px;font-size:.8rem;
  color:var(--muted);text-align:center;min-height:48px;border:1px solid var(--border)}
.battle-log .hit{color:var(--gold);font-weight:700}
.battle-log .miss{color:var(--red)}
.battle-log .win{color:var(--green);font-weight:900}
.battle-q{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.battle-qtext{font-weight:700;font-size:.9rem;margin-bottom:12px}
.battle-opts{display:flex;flex-direction:column;gap:8px}
.battle-opt{background:var(--bg2);border:2px solid var(--border);border-radius:8px;
  padding:10px 14px;cursor:pointer;font-size:.82rem;font-weight:600;color:var(--text);
  text-align:left;transition:all .2s}
.battle-opt:hover:not(:disabled){border-color:var(--red)}
.battle-opt.hit{border-color:var(--green);background:#0d2e1a;color:var(--green)}
.battle-opt.hurt{border-color:var(--red);background:#2e0d0d;color:var(--red)}
.battle-opt:disabled{cursor:default}
.battle-result{text-align:center;padding:20px}
.battle-result h2{font-size:1.5rem;font-weight:900;margin-bottom:12px}
.battle-result .reward{color:var(--gold);font-size:1rem;font-weight:700}

/* ── PROGRESS SCREEN ──────────────────────────── */
.progress-content{padding:16px;display:flex;flex-direction:column;gap:16px}
.progress-section{background:var(--card);border-radius:var(--r);padding:16px;border:1px solid var(--border)}
.progress-section h3{font-size:.8rem;color:var(--muted);text-transform:uppercase;
  letter-spacing:.5px;font-weight:700;margin-bottom:12px}
.stat-row{display:flex;justify-content:space-between;padding:8px 0;
  border-bottom:1px solid var(--border);font-size:.85rem}
.stat-row:last-child{border-bottom:none}
.stat-val{font-weight:800;color:var(--gold)}
.evo-tree{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px}
.evo-stage{text-align:center;flex-shrink:0;width:75px}
.evo-emoji{font-size:2.5rem;padding:8px;border-radius:12px;background:var(--bg);
  border:2px solid var(--border);display:block;transition:all .3s}
.evo-stage.unlocked .evo-emoji{border-color:var(--gold);background:#1a1500}
.evo-stage.current .evo-emoji{border-color:var(--accent);animation:glow-pulse 1.5s infinite}
.evo-label{font-size:.6rem;color:var(--muted);margin-top:4px;font-weight:700}
.evo-stage.unlocked .evo-label{color:var(--gold)}
.evo-stage.current .evo-label{color:var(--accent)}

/* ── ANIMATIONS ───────────────────────────────── */
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes char-bounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}
@keyframes boss-float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-15px) scale(1.05)}}
@keyframes float-particle{0%{opacity:0;transform:translateY(0) scale(1)}50%{opacity:1}100%{opacity:0;transform:translateY(-60px) scale(0)}}
@keyframes glow-pulse{0%,100%{box-shadow:0 0 8px var(--accent)}50%{box-shadow:0 0 20px var(--accent),0 0 40px rgba(124,111,255,.4)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes sparkle{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(2) rotate(45deg)}}
@keyframes slide-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.slide-up{animation:slide-up .3s ease}

/* ── MISC ─────────────────────────────────────── */
.section-header{padding:14px 16px 4px;font-size:.7rem;color:var(--muted);
  text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.no-boss-msg{text-align:center;padding:20px;color:var(--muted);font-size:.85rem}

/* ── VOCAB BOOK ───────────────────────────────── */
.vb-search{width:100%;padding:10px 14px;background:var(--card);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-size:.88rem;margin-bottom:12px}
.vb-search:focus{outline:none;border-color:var(--accent)}
.vb-search::placeholder{color:var(--muted)}
.vb-empty{text-align:center;padding:50px 20px;color:var(--muted)}
.vb-empty .vb-ei{font-size:3.5rem;margin-bottom:12px}
.vb-tag{display:inline-block;font-size:.58rem;background:var(--accent);color:#fff;
  border-radius:10px;padding:2px 8px;margin-bottom:6px;font-weight:700;letter-spacing:.3px}
.vb-tag.biz{background:#e74c3c}
.vb-date{font-size:.6rem;color:var(--muted);float:right;margin-top:2px}

/* ── CATEGORY SELECTOR ───────────────────────── */
.cat-wrap{display:flex;gap:10px;padding:0 14px;margin-bottom:4px}
.cat-btn{flex:1;background:var(--card);border:2px solid var(--border);border-radius:12px;
  padding:12px;text-align:center;cursor:pointer;transition:all .2s;color:var(--text)}
.cat-btn.active{border-color:var(--accent);background:#1e1e40}
.cat-btn .cat-icon{font-size:1.6rem;display:block;margin-bottom:4px}
.cat-btn .cat-label{font-size:.8rem;font-weight:700;display:block}
.cat-btn .cat-sub{font-size:.62rem;color:var(--muted);display:block}
.cat-btn.active .cat-label{color:var(--accent)}

/* ── LESSON HEADER (TIMER → EXIT BUTTON) ─────── */
.lesson-topbar{padding:6px 16px 8px;background:var(--bg2)}
.exit-btn{background:var(--card);border:2px solid var(--border);color:var(--text);
  border-radius:20px;padding:8px 32px;font-weight:700;font-size:.88rem;cursor:pointer}
.lesson-timer{padding:8px 16px 10px;background:var(--bg2);display:flex;justify-content:center;border-bottom:1px solid var(--border)}
</style>
</head>
<body>

<!-- ════════════════════════════════════════════
     HOME SCREEN
════════════════════════════════════════════ -->
<div id="screen-home" class="screen active">
  <div class="topbar">
    <div class="topbar-logo">EngMon 🐲</div>
    <div class="topbar-stats">
      <div class="streak">🔥 <span id="h-streak">0</span>日</div>
      <div class="xp-stat">⭐ <span id="h-xp">0</span> XP</div>
    </div>
  </div>

  <div class="char-area">
    <div class="char-level">Lv.<span id="h-level">1</span></div>
    <div class="char-wrapper">
      <div id="h-char"><!-- SVG injected --></div>
      <div class="char-particles" id="h-particles"></div>
    </div>
    <div class="char-name" id="h-charname">Wordoru</div>
    <div class="char-title" id="h-chartitle">見習い英語使い</div>
  </div>

  <div class="xp-section">
    <div class="xp-labels">
      <span id="h-xp-cur">0 XP</span>
      <span id="h-xp-next">次のレベルまで 200 XP</span>
    </div>
    <div class="xp-bar"><div class="xp-fill" id="h-xp-fill" style="width:0%"></div></div>
  </div>

  <div class="section-header">今日のカテゴリー</div>
  <div class="cat-wrap">
    <button class="cat-btn active" id="cat-daily" onclick="setCategory('daily')">
      <span class="cat-icon">🏡</span>
      <span class="cat-label">日常会話</span>
      <span class="cat-sub">Daily Life</span>
    </button>
    <button class="cat-btn" id="cat-business" onclick="setCategory('business')">
      <span class="cat-icon">💼</span>
      <span class="cat-label">ビジネス</span>
      <span class="cat-sub">Business English</span>
    </button>
  </div>

  <div class="section-header">今日のレッスン</div>
  <div class="cards">
    <div class="game-card" id="lesson-card" onclick="goLesson()">
      <div class="card-icon">📚</div>
      <div class="card-body">
        <div class="card-title" id="lesson-title">Loading...</div>
        <div class="card-sub" id="lesson-sub">今日のシナリオ</div>
        <div class="card-meta" id="lesson-meta">⏱ 5分 • 未学習</div>
      </div>
      <div class="card-arrow" id="lesson-arrow">›</div>
    </div>
  </div>

  <div class="section-header" id="boss-section-header" style="display:none">週間ボスバトル</div>
  <div class="cards" id="boss-card-wrap" style="display:none">
    <div class="game-card boss-card" onclick="navigate('boss')">
      <div class="card-icon">⚔️</div>

const STORAGE_KEY = 'engmon_v2';
let S; // main state object

function defaultState() {
  const today = dateStr();
  return {
    xp:0, totalDays:0, streak:0, maxStreak:0,
    lastStudyDate:null, weekStart:getWeekStart(),
    weeklyDays:[false,false,false,false,false,false,false],
    todayDone:false, bossWins:0, bossDefeated:false,
    bossWeekIndex:0, category:'daily', learnedVocab:[]
  };
}
function loadState(){
  try{ S=JSON.parse(localStorage.getItem(STORAGE_KEY))||defaultState(); }
  catch(e){ S=defaultState(); }
  // If new week, reset weekly days
  if(S.weekStart!==getWeekStart()){
    S.weekStart=getWeekStart();
    S.weeklyDays=[false,false,false,false,false,false,false];
    S.bossDefeated=false;
    S.bossWeekIndex=(S.bossWeekIndex+1)%BOSSES.length;
  }
  // Check if today is already done
  S.todayDone = (S.lastStudyDate===dateStr());
  if(!S.category) S.category='daily';
  if(!S.learnedVocab) S.learnedVocab=[];
}
function saveState(){ localStorage.setItem(STORAGE_KEY,JSON.stringify(S)); }

function dateStr(d){ return (d||new Date()).toISOString().slice(0,10); }
function getWeekStart(){
  const d=new Date(); d.setHours(0,0,0,0);
  const day=d.getDay(); d.setDate(d.getDate()-day);
  return dateStr(d);
}
function getDayOfWeek(){ return new Date().getDay(); } // 0=Sun...6=Sat

// XP levels
function getCharLevel(xp){
  for(let i=CHAR_LEVELS.length-1;i>=0;i--) if(xp>=CHAR_LEVELS[i]) return i;
  return 0;
}

// ═══════════════════════════════════════════════════
//  AUDIO (Web Speech API)
// ═══════════════════════════════════════════════════
let synth=window.speechSynthesis;
let voices=[];
let currentUtterance=null;

function initSpeech(){
  if(!synth) return;
  function load(){
    voices=synth.getVoices();
  }
  load();
  synth.onvoiceschanged=load;
}

function getBestVoice(){
  const preferred=['Samantha','Alex','Google US English','Microsoft David','en-US'];
  for(const p of preferred){
    const v=voices.find(v=>v.name.includes(p)||v.lang==='en-US');
    if(v) return v;
  }
  return voices.find(v=>v.lang.startsWith('en'))||null;
}

function speak(text, onEnd, rate=0.88){
  if(!synth) return;
  synth.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';
  u.rate=rate;
  const v=getBestVoice();
  if(v) u.voice=v;
  if(onEnd) u.onend=onEnd;
  currentUtterance=u;
  synth.speak(u);
}

function stopSpeech(){
  if(synth) synth.cancel();
  currentUtterance=null;
}

// ═══════════════════════════════════════════════════
//  COMPLETION SOUND (Web Audio API)
// ═══════════════════════════════════════════════════
function playCompletionSound(){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const now=ac.currentTime;
    const master=ac.createGain();
    master.gain.setValueAtTime(0.24,now);
    master.connect(ac.destination);

    // ── ① ファンファーレ アルペジオ (C E G C5 E5) ──
    // 明るいトライアングル波で素早く上昇
    [261.63,329.63,392.00,523.25,659.25].forEach((freq,i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='triangle';o.frequency.value=freq;o.connect(g);g.connect(master);
      const t=now+i*0.11;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.4,t+0.03);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
      o.start(t);o.stop(t+0.55);
    });

    // ── ② トライアドの締め音 (C4 E4 G4 同時打ち) ──
    [261.63,329.63,392.00].forEach(freq=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='triangle';o.frequency.value=freq;o.connect(g);g.connect(master);
      const t=now+0.58;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.28,t+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.9);
      o.start(t);o.stop(t+1.0);
    });

    // ── ③ 余韻コード (C3 G3 E4 C5 — Cメジャー、3秒版) ──
    [130.81,196.00,329.63,523.25].forEach(freq=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='sine';o.frequency.value=freq;o.connect(g);g.connect(master);
      const t=now+0.62;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.07,t+0.1);
      g.gain.setValueAtTime(0.07,t+1.2);
      g.gain.linearRampToValueAtTime(0,t+2.2);
      o.start(t);o.stop(t+2.4);
    });

    // マスターフェードアウト (3秒で完全消音)
    master.gain.setValueAtTime(0.24,now+2.2);
    master.gain.linearRampToValueAtTime(0,now+3.0);
    setTimeout(()=>{try{ac.close();}catch(e){}},3500);
  }catch(e){console.log('Web Audio not supported',e);}
}

function navigate(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.screen===id);
  });
  const sc=document.getElementById('screen-'+id);
  if(sc) sc.classList.add('active');
  stopSpeech();
  if(id==='home') renderHome();
  if(id==='progress') renderProgress();
  if(id==='boss') renderBoss();
  if(id==='vocab') renderVocabBook();
}

// ═══════════════════════════════════════════════════
//  LESSON ENGINE
// ═══════════════════════════════════════════════════
let lessonState={};
let timerInterval=null;
let timerSeconds=300;

function goLesson(){
  navigate('lesson');
  startLesson();
}

function startLesson(){
  const sc=getScenario();
  lessonState={
    scenario:sc, phase:0,
    vocabIdx:0, vocabFlipped:false,
    quizIdx:0, quizDone:false,
    xpEarned:0, quizScore:0
  };
  timerSeconds=300;
  startTimer();
  showPhase(0);
}

function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timerSeconds--;
    const m=Math.floor(timerSeconds/60), s=timerSeconds%60;
    document.getElementById('timer-text').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    const pct=(timerSeconds/300)*100;
    document.getElementById('timer-fill').style.width=pct+'%';
    if(timerSeconds<=0){ clearInterval(timerInterval); finishLesson(true); }
  },1000);
}

function exitLesson(){
  stopSpeech();
  clearInterval(timerInterval);
  navigate('home');
}

// Phase 0: Situation intro
// Phase 1: Dialogue
// Phase 2: Vocab
// Phase 3: Quiz
// Phase 4: Results

function showPhase(n){
  lessonState.phase=n;
  const lc=document.getElementById('lesson-content');
  lc.innerHTML='';
  if(n===0) renderPhaseIntro(lc);
  else if(n===1) renderPhaseDialogue(lc);
  else if(n===2) renderPhaseVocab(lc);
  else if(n===3) renderPhaseQuiz(lc);
  else if(n===4) renderPhaseResult(lc);
}

function renderPhaseIntro(lc){
  const sc=lessonState.scenario;
  lc.innerHTML=`
    <span class="phase-badge">シナリオ紹介</span>
    <div class="situation-card slide-up">
      <div class="situation-emoji">${sc.emoji}</div>
      <div class="situation-title">${sc.titleJa}</div>
      <div class="situation-desc-ja">${sc.situationJa}</div>
      <div class="situation-desc" style="margin-top:10px;color:var(--text)">${sc.title}</div>
      <button class="start-lesson-btn" onclick="showPhase(1)">🎧 会話を聞く →</button>
    </div>`;
}

function renderPhaseDialogue(lc){
  const sc=lessonState.scenario;
  let playIdx=-1;
  let isPlaying=false;

  lc.innerHTML=`
    <span class="phase-badge">会話を聞く</span>
    <div class="dialogue-list" id="d-list">
      ${sc.dialogue.map((d,i)=>`
        <div class="d-bubble-row ${d.r?'right':''}" id="drow-${i}" onclick="speakOne(${i})">
          <div class="d-avatar">${sc.chars[d.c].avatar}</div>
          <div class="d-bubble" id="db-${i}">
            <div class="d-speaker">${sc.chars[d.c].name}</div>
            <div class="d-text">
              <div class="d-en">${d.en}</div>
              <div class="d-ja">${d.ja}</div>
            </div>
          </div>
        </div>`).join('')}
    </div>
    <button class="play-all-btn" id="play-all-btn" onclick="playAll()">▶ 全部まとめて再生</button>
    <button class="next-phase-btn" onclick="doVocab()">📖 単語を学ぶ →</button>`;

  // Auto-speak first line
  setTimeout(()=>speakLine(0),400);

  window.speakOne=function(i){
    speakLine(i);
  };

  window.speakLine=function(i){
    document.querySelectorAll('.d-bubble').forEach(b=>b.classList.remove('speaking'));
    const db=document.getElementById('db-'+i);
    if(db) db.classList.add('speaking');
    speak(sc.dialogue[i].en, ()=>{
      setTimeout(()=>{
        if(db) db.classList.remove('speaking');
      },300);
    });
  };

  window.playAll=function(){
    const btn=document.getElementById('play-all-btn');
    if(isPlaying){ stopSpeech(); isPlaying=false; btn.textContent='▶ 全部まとめて再生'; btn.classList.remove('playing'); return; }
    isPlaying=true; btn.textContent='⏹ 停止'; btn.classList.add('playing');
    let idx=0;
    function next(){
      if(idx>=sc.dialogue.length||!isPlaying){ isPlaying=false; btn.textContent='▶ 全部まとめて再生'; btn.classList.remove('playing'); return; }
      speakLine(idx);
      speak(sc.dialogue[idx].en,()=>{ idx++; setTimeout(next,600); });
    }
    next();
  };
}

function doVocab(){
  stopSpeech();
  lessonState.xpEarned+=20; // dialogue XP
  showPhase(2);
}

function renderPhaseVocab(lc){
  const vocab=lessonState.scenario.vocab;
  const idx=lessonState.vocabIdx;
  if(idx>=vocab.length){ doQuiz(); return; }
  const v=vocab[idx];

  lc.innerHTML=`
    <span class="phase-badge">単語 ${idx+1}/${vocab.length}</span>
    <div class="vocab-progress">
      ${vocab.map((_,i)=>`<div class="vocab-dot ${i<=idx?'active':''}"></div>`).join('')}
    </div>
    <div class="vocab-flip-card" id="vcard" onclick="flipVocab()">
      <div class="vocab-flip-inner">
        <div class="vocab-face vocab-front">
          <div class="vlabel">American English</div>
          <div class="vterm">${v.term}</div>
          <div class="vex">"${v.ex}"</div>
          <div style="font-size:.65rem;opacity:.6;margin-top:14px">👆 タップして意味を見る</div>
        </div>
        <div class="vocab-face vocab-back">
          <div class="vlabel">意味</div>
          <div class="vterm" style="font-size:1.05rem">${v.ja}</div>
          <div class="vex">"${v.ex}"</div>
          ${v.origin?`<div class="vocab-origin">
            <span class="origin-tag">💡 語源・読み解き方</span>
            <span class="origin-orig">元の意味 → ${v.origin.original}</span>
            <span class="origin-why">${v.origin.why}</span>
          </div>`:''}
        </div>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button onclick="speakVocab('${v.term.replace(/'/g,"\\'")}','${v.ex.replace(/'/g,"\\'")}'); return false;"
        style="flex:1;padding:10px;background:var(--bg2);border:1px solid var(--border);
          border-radius:10px;color:var(--accent);font-weight:700;cursor:pointer">
        🔊 音声で聞く
      </button>
      <button onclick="nextVocab()"
        style="flex:2;padding:10px;background:var(--accent);border:none;
          border-radius:10px;color:#fff;font-weight:700;cursor:pointer">
        ${idx<vocab.length-1?'次の単語 →':'クイズへ進む →'}
      </button>
    </div>`;

  window.flipVocab=function(){
    document.getElementById('vcard').classList.toggle('flipped');
  };
  window.speakVocab=function(term,ex){
    speak(term+'. '+ex);
  };
  window.nextVocab=function(){
    lessonState.xpEarned+=10;
    lessonState.vocabIdx++;
    renderPhaseVocab(lc);
  };
}

function doQuiz(){
  stopSpeech();
  lessonState.xpEarned+=20;
  showPhase(3);
}

function renderPhaseQuiz(lc){
  const quiz=lessonState.scenario.quiz;
  const idx=lessonState.quizIdx;
  if(idx>=quiz.length){ finishLesson(false); return; }
  const q=quiz[idx];

  lc.innerHTML=`
    <span class="phase-badge">クイズ ${idx+1}/${quiz.length}</span>
    <div class="quiz-q slide-up">
      <div class="quiz-qnum">問題 ${idx+1}</div>
      <div class="quiz-qtext">${q.q}</div>
      ${q.sub?`<div class="quiz-qsub">${q.sub}</div>`:''}
    </div>
    <div class="quiz-opts">
      ${q.opts.map((o,i)=>`<button class="quiz-opt" id="qo${i}" onclick="answerQ(${i})">${o}</button>`).join('')}
    </div>
    <div class="quiz-fb" id="qfb" style="display:none">${q.fb}</div>
    <button class="next-phase-btn" id="qnext" style="display:none" onclick="nextQ()">
      ${idx<quiz.length-1?'次の問題 →':'結果を見る →'}
    </button>`;

  window.answerQ=function(chosen){
    document.querySelectorAll('.quiz-opt').forEach(b=>b.disabled=true);
    const correct=chosen===q.ans;
    document.getElementById('qo'+chosen).classList.add(correct?'correct':'wrong');
    if(!correct) document.getElementById('qo'+q.ans).classList.add('correct');
    if(correct){ lessonState.xpEarned+=20; lessonState.quizScore++; }
    const fb=document.getElementById('qfb');
    fb.style.display='block';
    if(!correct) fb.classList.add('wrong-fb');
    document.getElementById('qnext').style.display='block';
  };
  window.nextQ=function(){
    lessonState.quizIdx++;
    renderPhaseQuiz(lc);
  };
}

function finishLesson(timedOut){
  stopSpeech(); clearInterval(timerInterval);
  // Bonus XP
  if(lessonState.quizScore===lessonState.scenario.quiz.length) lessonState.xpEarned+=30; // perfect
  // Streak / study tracking
  const today=dateStr();
  const todayWasAlreadyDone=S.todayDone;
  if(!todayWasAlreadyDone){
    const dayIdx=getDayOfWeek();
    S.weeklyDays[dayIdx]=true;
    S.todayDone=true;
    S.lastStudyDate=today;
    S.totalDays++;
    // Streak
    const yd=new Date(); yd.setDate(yd.getDate()-1);
    if(S.lastStudyDate===dateStr(yd)||S.streak===0){
      S.streak++;
    } else {
      S.streak=1;
    }
    S.maxStreak=Math.max(S.maxStreak,S.streak);
    // Streak bonus
    lessonState.xpEarned+=50;
  }
  // 単語帳に学習済み単語を保存
  const sc=lessonState.scenario;
  sc.vocab.forEach(v=>{
    if(!S.learnedVocab.some(x=>x.term===v.term)){
      S.learnedVocab.push({
        term:v.term, ja:v.ja, ex:v.ex, origin:v.origin||null,
        category:S.category, scenarioTitle:sc.titleJa,
        scenarioEmoji:sc.emoji, date:dateStr()
      });
    }
  });
  const oldLevel=getCharLevel(S.xp);
  S.xp+=lessonState.xpEarned;
  const newLevel=getCharLevel(S.xp);
  saveState();
  playCompletionSound();
  showPhase(4);
  renderPhaseResult(document.getElementById('lesson-content'),oldLevel,newLevel,todayWasAlreadyDone);
}

function renderPhaseResult(lc,oldLevel,newLevel,alreadyDone){
  const score=lessonState.quizScore, total=lessonState.scenario.quiz.length;
  const pct=Math.round(score/total*100);
  const emoji=pct===100?'🏆':pct>=66?'⭐':'📚';
  const msg=pct===100?'Perfect! 完璧です！':pct>=66?'よくできました！':'次は満点を目指そう！';
  const leveledUp=newLevel>oldLevel;

  lc.innerHTML=`
    <div class="result-wrap slide-up">
      <div class="result-emoji">${emoji}</div>
      <div class="result-title">${msg}</div>
      <div class="result-xp">+${lessonState.xpEarned} XP 獲得！</div>
      <div class="xp-items">
        <div class="xp-item"><span>会話リスニング</span><span class="plus">+20 XP</span></div>
        <div class="xp-item"><span>単語学習</span><span class="plus">+${lessonState.scenario.vocab.length*10} XP</span></div>
        <div class="xp-item"><span>クイズ正解 ${score}/${total}</span><span class="plus">+${score*20} XP</span></div>
        ${score===total?'<div class="xp-item"><span>🏆 パーフェクトボーナス</span><span class="plus">+30 XP</span></div>':''}
        ${!alreadyDone?'<div class="xp-item"><span>🔥 毎日ボーナス</span><span class="plus">+50 XP</span></div>':''}
      </div>
      <div class="level-up-banner ${leveledUp?'show':''}">
        <h3>🎉 レベルアップ！ ${CHARS[newLevel].name} に進化！</h3>
      </div>
      <button class="back-home-btn" onclick="exitLesson()">🏠 ホームへ戻る</button>
    </div>`;
}

// ═══════════════════════════════════════════════════
//  BOSS BATTLE
// ═══════════════════════════════════════════════════
let bossState={};

function renderBoss(){
  const ba=document.getElementById('battle-area');
  const studiedDays=S.weeklyDays.filter(Boolean).length;
  const boss=BOSSES[S.bossWeekIndex];
  const playerChar=CHARS[getCharLevel(S.xp)];

  if(studiedDays===0){
    ba.innerHTML=`<div class="no-boss-msg">
      <div style="font-size:3rem;margin-bottom:12px">🔒</div>
      <div style="font-weight:700;margin-bottom:8px">ボスはまだ出現していない</div>
      <div>最初のレッスンを完了するとボスが現れる！</div>
    </div>`;
    return;
  }

  if(S.bossDefeated){
    ba.innerHTML=`<div class="no-boss-msg" style="text-align:center;padding:30px">
      <div style="font-size:4rem">🏆</div>
      <div style="font-size:1.2rem;font-weight:900;color:var(--gold);margin:12px 0">今週のボスを撃退！</div>
      <div style="color:var(--muted)">次の週もレッスンを続けて強くなろう！</div>
    </div>`;
    return;
  }

  // Bonus HP advantage based on study days
  const bonusHits=studiedDays>=5?2:studiedDays>=3?1:0;
  bossState={
    boss, questions:[...boss.questions].sort(()=>Math.random()-.5).slice(0,5),
    bossMaxHP:5, bossHP:5-bonusHits,
    playerMaxHP:3, playerHP:3,
    qIdx:0, done:false, bonusHits
  };

  renderBattleUI(ba);
}

function renderBattleUI(ba){
  const bs=bossState;
  if(bs.done){ renderBattleResult(ba); return; }

  const q=bs.questions[bs.qIdx];
  const bossHPPct=Math.max(0,(bs.bossHP/bs.bossMaxHP)*100);
  const playerHPPct=Math.max(0,(bs.playerHP/bs.playerMaxHP)*100);

  ba.innerHTML=`
    <div class="battle-top">
      <div class="fighter">
        <div class="fighter-name">${bs.boss.emoji} ${bs.boss.name}</div>
        <div class="boss-display">${bs.boss.emoji}</div>
        <div class="hp-bar-wrap"><div class="hp-fill boss-hp" style="width:${bossHPPct}%"></div></div>
        <div class="hp-text">HP: ${bs.bossHP} / ${bs.bossMaxHP}</div>
      </div>
      <div class="battle-vs">VS</div>
      <div class="fighter">
        <div class="fighter-name">${CHARS[getCharLevel(S.xp)].name}</div>
        <div class="player-display">${CHARS[getCharLevel(S.xp)].emoji}</div>
        <div class="hp-bar-wrap"><div class="hp-fill player-hp" style="width:${playerHPPct}%"></div></div>
        <div class="hp-text">HP: ${bs.playerHP} / ${bs.playerMaxHP}</div>
      </div>
    </div>
    ${bs.bonusHits>0?`<div style="text-align:center;font-size:.75rem;color:var(--gold);font-weight:700">⚡ 今週${S.weeklyDays.filter(Boolean).length}日学習！ボスに先制${bs.bonusHits}ダメージ！</div>`:''}
    <div class="battle-log" id="battle-log">問題 ${bs.qIdx+1}/5 — 正解でボスにダメージ！</div>
    <div class="battle-q">
      <div class="battle-qtext">${q.q}</div>
      <div class="battle-opts">
        ${q.opts.map((o,i)=>`<button class="battle-opt" id="bo${i}" onclick="battleAnswer(${i})">${o}</button>`).join('')}
      </div>
    </div>
    <div id="battle-next" style="display:none">
      <button class="next-phase-btn" onclick="battleNextQ()" style="margin-top:10px">次の攻撃 →</button>
    </div>`;
}

window.battleAnswer=function(chosen){
  const bs=bossState;
  if(bs.done) return;
  const q=bs.questions[bs.qIdx];
  const correct=chosen===q.ans;
  document.querySelectorAll('.battle-opt').forEach(b=>b.disabled=true);
  document.getElementById('bo'+chosen).classList.add(correct?'hit':'hurt');
  if(!correct) document.getElementById('bo'+q.ans).classList.add('hit');

  const log=document.getElementById('battle-log');
  if(correct){
    bs.bossHP--;
    log.innerHTML=`<span class="hit">💥 ヒット！ ${bs.boss.name} に1ダメージ！</span>`;
    if(bs.bossHP<=0){
      bs.done=true;
      log.innerHTML=`<span class="win">🏆 ${bs.boss.name} を撃退！あなたの勝ち！</span>`;
      S.bossDefeated=true; S.bossWins++;
      const xpBonus=200;
      S.xp+=xpBonus; saveState();
      setTimeout(()=>{document.getElementById('battle-next').style.display='block';},800);
      return;
    }
  } else {
    bs.playerHP--;
    log.innerHTML=`<span class="miss">❌ ミス！ ${bs.boss.name} の反撃！</span>`;
    if(bs.playerHP<=0){
      bs.done=true;
      log.innerHTML=`<span class="miss">💀 体力切れ...。もっと学習して再挑戦！</span>`;
      setTimeout(()=>{document.getElementById('battle-next').style.display='block';},800);
      return;
    }
  }
  document.getElementById('battle-next').style.display='block';
};

window.battleNextQ=function(){
  const bs=bossState;
  bs.qIdx++;
  if(bs.qIdx>=bs.questions.length) bs.done=true;
  renderBattleUI(document.getElementById('battle-area'));
};

function renderBattleResult(ba){
  const bs=bossState;
  const won=bs.bossHP<=0;
  if(won) playCompletionSound();
  ba.innerHTML=`<div class="battle-result">
    <div style="font-size:5rem">${won?'🏆':'💀'}</div>
    <h2 style="color:${won?'var(--gold)':'var(--red)'}">
      ${won?'勝利！':'敗北...'}
    </h2>
    <p style="color:var(--muted);margin-bottom:16px">
      ${won?`${bs.boss.name} を撃退！ +200 XP 獲得！`:'毎日レッスンを続けてパワーアップしよう！'}
    </p>
    ${won?'<div class="reward">+200 XP 報酬！</div>':''}
    <button class="back-home-btn" onclick="navigate(\'home\')" style="margin-top:20px">
      🏠 ホームへ戻る
    </button>
  </div>`;
}

// ═══════════════════════════════════════════════════
//  VOCAB BOOK
// ═══════════════════════════════════════════════════
let _vbFiltered=[];

function renderVocabBook(){
  const all=[...S.learnedVocab].reverse();
  _vbFiltered=all;
  document.getElementById('vb-total').textContent=S.learnedVocab.length;
  const inp=document.getElementById('vb-search');
  if(inp) inp.value='';
  renderVocabList(all);
}

function filterVocab(q){
  const kw=q.toLowerCase().trim();
  _vbFiltered=kw
    ?[...S.learnedVocab].reverse().filter(v=>
        v.term.toLowerCase().includes(kw)||
        v.ja.includes(kw)||
        v.ex.toLowerCase().includes(kw))
    :[...S.learnedVocab].reverse();
  renderVocabList(_vbFiltered);
}

function renderVocabList(list){
  const el=document.getElementById('vocab-book-content');
  if(!el) return;
  if(S.learnedVocab.length===0){
    el.innerHTML=`<div class="vb-empty">
      <div class="vb-ei">📚</div>
      <div style="font-weight:700;margin-bottom:8px">まだ単語がありません</div>
      <div style="font-size:.8rem">レッスンを完了すると<br>ここに単語が追加されます！</div>
    </div>`;
    return;
  }
  if(list.length===0){
    el.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted);font-size:.85rem">該当する単語がありません</div>';
    return;
  }
  el.innerHTML=list.map((v,i)=>`
    <div class="vocab-flip-card" id="vbc-${i}" onclick="document.getElementById('vbc-${i}').classList.toggle('flipped')" style="margin-bottom:10px">
      <div class="vocab-flip-inner">
        <div class="vocab-face vocab-front">
          <span class="vb-tag ${v.category==='business'?'biz':''}">${v.scenarioEmoji} ${v.scenarioTitle}</span>
          <span class="vb-date">${v.date||''}</span>
          <div class="vlabel">American English</div>
          <div class="vterm">${v.term}</div>
          <div class="vex">"${v.ex}"</div>
          <div style="font-size:.6rem;opacity:.5;margin-top:10px">👆 タップして意味を見る</div>
        </div>
        <div class="vocab-face vocab-back">
          <span class="vb-tag ${v.category==='business'?'biz':''}">${v.category==='business'?'💼 Business':'🏡 Daily'}</span>
          <div class="vlabel">意味</div>
          <div class="vterm" style="font-size:1.05rem">${v.ja}</div>
          <div class="vex">"${v.ex}"</div>
          ${v.origin?`<div class="vocab-origin">
            <span class="origin-tag">💡 語源・読み解き方</span>
            <span class="origin-orig">元の意味 → ${v.origin.original}</span>
            <span class="origin-why">${v.origin.why}</span>
          </div>`:''}
        </div>
      </div>
    </div>`).join('');
}

}
